version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hunto
    ports:
      - '5435:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  backend-go:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    volumes:
      - ./backend-go:/app
    depends_on:
      - postgres
      - minio
      - minio-init
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/hunto?sslmode=disable
      PORT: '3000'
      ADMIN_API_KEY: 'admin123'
      PARTNER_KEYS: 1:partner-1,2:partner-2,3:partner-3,4:partner-4
      CORS_ALLOWED_ORIGINS: http://localhost:5174,http://127.0.0.1:5174,http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.24:5173,http://192.168.1.24:5174
      # Local MinIO (enabled by default for partner dish image uploads)
      STORAGE_BUCKET: 'hunto-images'
      STORAGE_REGION: 'us-east-1'
      STORAGE_ENDPOINT: 'http://localhost:9000'
      STORAGE_ACCESS_KEY_ID: 'minioadmin'
      STORAGE_SECRET_ACCESS_KEY: 'minioadmin'
      STORAGE_PUBLIC_BASE_URL: 'http://${HOST_LAN_IP:-localhost}:9000/hunto-images'
      STORAGE_UPLOAD_PREFIX: 'menu-items'
      STORAGE_FORCE_PATH_STYLE: 'true'
      STORAGE_MAX_UPLOAD_MB: '5'
    ports:
      - '3000:3000'
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing local/hunto-images
        /usr/bin/mc anonymous set download local/hunto-images
        cat >/tmp/cors.json <<'EOF'
        [
          {
            "AllowedOrigins": ["http://localhost:5174", "http://127.0.0.1:5174"],
            "AllowedMethods": ["GET", "PUT", "HEAD"],
            "AllowedHeaders": ["*"],
            "ExposeHeaders": ["ETag"],
            "MaxAgeSeconds": 3000
          }
        ]
        EOF
        /usr/bin/mc cors set local/hunto-images /tmp/cors.json
    restart: 'no'

volumes:
  db_data:
  minio_data:
